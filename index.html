<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SWAT Tank Split Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --black: #121212;
      --white: #FFFFFF;
      --off-white: #FAFAFA;
      --dark-orange: #EA5725;
      --orange: #F68D23;
      --yellow: #FBBE1F;
      --light-green: #9EBA3E;
      --dark-green: #5AA946;
      --grey: #B6B8BA;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--off-white);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: var(--black);
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      background: var(--white);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      width: 380px;
      max-width: 100%;
      text-align: center;
      border-top: 6px solid var(--dark-orange);
    }

    h2 {
      margin: 6px 0 12px;
      color: var(--black);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid var(--grey);
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 16px;
      background: var(--dark-orange);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: var(--orange);
    }

    .secondary-button {
      background: var(--black);
      margin-top: 4px;
    }

    .secondary-button:hover {
      background: #333333;
    }

    .tank-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tank-row input {
      flex: 1;
    }

    .remove-button {
      width: 44px;
      padding: 12px 0;
      background: var(--grey);
      color: var(--black);
      margin-top: 0;
    }

    .remove-button:hover {
      background: #999999;
    }

    .result {
      margin-top: 18px;
      font-size: 16px;
      font-weight: bold;
      white-space: pre-line;
      background: var(--off-white);
      padding: 12px;
      border-radius: 10px;
      text-align: left;
    }

    .section-label {
      font-size: 14px;
      color: #666666;
      margin-top: 10px;
      text-align: left;
      font-weight: bold;
    }

    .help-text {
      font-size: 12px;
      color: #666666;
      text-align: left;
      margin-top: -4px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Tank Split Calculator</h2>

    <div class="section-label">Tank Sizes (bu)</div>
    <div id="tankContainer"></div>
    <button class="secondary-button" onclick="addTank()">+ Add Tank</button>

    <div class="section-label">Default Rate (lbs/ac)</div>
    <input id="rate" type="number" placeholder="e.g. 150">

    <div class="section-label">Product Weight (lbs/bu)</div>
    <input id="productWeight" type="number" placeholder="e.g. 60">
    <div class="help-text">Used to calculate acres covered by each tank.</div>

    <button onclick="calculate()">Calculate</button>
    <div class="result" id="result"></div>
  </div>

  <script>
let tankCount = 0;

function addTank() {
  const container = document.getElementById('tankContainer');

  const row = document.createElement('div');
  row.className = 'tank-row';

  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'tank-input';
  input.placeholder = `Tank ${container.children.length + 1}`;

  const removeButton = document.createElement('button');
  removeButton.type = 'button';
  removeButton.className = 'remove-button';
  removeButton.innerText = '×';
  removeButton.onclick = () => {
    row.remove();
    renumber();
  };

  row.appendChild(input);
  row.appendChild(removeButton);
  container.appendChild(row);
}

function renumber() {
  const inputs = document.querySelectorAll('.tank-input');
  inputs.forEach((input, i) => {
    input.placeholder = `Tank ${i + 1}`;
  });
}

function calculate() {
  const inputs = Array.from(document.querySelectorAll('.tank-input'));
  const tanks = inputs.map(i => parseFloat(i.value)).filter(v => !isNaN(v) && v > 0);

  const rate = parseFloat(document.getElementById('rate').value);
  const productWeight = parseFloat(document.getElementById('productWeight').value);
  const result = document.getElementById('result');

  if (tanks.length < 2) {
    result.innerText = 'Enter at least 2 tank sizes';
    return;
  }

  const total = tanks.reduce((a,b) => a + b, 0);

  let output = 'Split:\n';

  tanks.forEach((t, i) => {
    const pct = (t / total * 100).toFixed(1);
    output += `Tank ${i+1}: ${pct}%\n`;
  });

  if (!isNaN(rate)) {
    output += '\nSet Default Rates to:\n';
    tanks.forEach((t,i) => {
      const r = (t / total) * rate;
      output += `Tank ${i+1}: ${r.toFixed(1)} lbs/ac\n`;
    });
  }

  if (!isNaN(rate) && !isNaN(productWeight)) {
    const totalBu = total;
    const acres = (totalBu * productWeight) / rate;
    output += `\nAcres covered at: ${rate} lbs/ac\n${acres.toFixed(1)} ac`;
  }

  result.innerText = output;
}

// default 2 tanks
addTank();
addTank();
</script>
</body>
</html>
